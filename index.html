<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Asistencia · Lobato Tours</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:        #ffffff;
      --surface:   #f8f5f5;
      --surface2:  #ffffff;
      --border:    #e8dede;
      --accent:    #8B1A1A;
      --accent-dk: #6b1212;
      --accent-lt: #f5eded;
      --text:      #1a1a1a;
      --muted:     #777070;
      --success:   #2d7a3a;
      --success-bg:#edf7ef;
      --danger:    #c0392b;
      --danger-bg: #fdf0ef;
      --radius:    10px;
      --font:      'Inter', system-ui, sans-serif;
      --shadow:    0 2px 12px rgba(139,26,26,.08);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0 1rem 4rem;
    }

    .topbar {
      width: 100%;
      background: var(--accent);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0.9rem 1.5rem;
      margin-bottom: 2.2rem;
      box-shadow: 0 2px 8px rgba(139,26,26,.25);
    }
    .topbar img {
      height: 38px;
      filter: brightness(0) invert(1);
    }

    .card {
      width: 100%;
      max-width: 460px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 2rem;
      box-shadow: var(--shadow);
    }
    .card-eyebrow {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: .13em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 1.5rem;
    }
    .card-eyebrow::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* GPS status badge */
    .gps-status {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.78rem;
      font-weight: 600;
      padding: 0.5rem 0.75rem;
      border-radius: 7px;
      margin-bottom: 1.1rem;
      transition: all .3s;
    }
    .gps-status.checking { background: #fef9ec; color: #b07d00; border: 1.5px solid #f0d060; }
    .gps-status.ok       { background: var(--success-bg); color: var(--success); border: 1.5px solid #a8d5b0; }
    .gps-status.error    { background: var(--danger-bg);  color: var(--danger);  border: 1.5px solid #f0b0ab; }
    .gps-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .checking .gps-dot { background: #b07d00; animation: pulse 1.2s infinite; }
    .ok .gps-dot       { background: var(--success); }
    .error .gps-dot    { background: var(--danger); }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

    label {
      display: block;
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--muted);
      margin-bottom: 0.3rem;
      letter-spacing: .03em;
    }
    input, select {
      width: 100%;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 7px;
      color: var(--text);
      font-family: var(--font);
      font-size: 0.95rem;
      padding: 0.65rem 0.9rem;
      margin-bottom: 1.1rem;
      transition: border-color .15s, box-shadow .15s;
      appearance: none;
    }
    input:focus, select:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(139,26,26,.1);
    }
    input[readonly] { opacity: .65; cursor: default; }

    .select-wrap { position: relative; margin-bottom: 1.1rem; }
    .select-wrap select { margin-bottom: 0; padding-right: 2.2rem; }
    .select-wrap::after {
      content: '▾';
      position: absolute;
      right: 0.9rem; top: 50%;
      transform: translateY(-50%);
      color: var(--accent);
      pointer-events: none;
    }

    .btn-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.75rem;
      margin-top: 0.25rem;
    }
    button {
      padding: 0.75rem 1rem;
      border: none;
      border-radius: 7px;
      font-family: var(--font);
      font-size: 0.9rem;
      font-weight: 700;
      cursor: pointer;
      transition: opacity .15s, transform .1s, box-shadow .15s;
    }
    button:active { transform: scale(.97); }
    button:disabled { opacity: .4; cursor: not-allowed; }
    .btn-in {
      background: var(--accent);
      color: #fff;
      box-shadow: 0 2px 8px rgba(139,26,26,.25);
    }
    .btn-in:hover:not(:disabled) { background: var(--accent-dk); }
    .btn-out {
      background: var(--accent-lt);
      color: var(--accent);
      border: 1.5px solid var(--border);
    }
    .btn-out:hover:not(:disabled) { background: #eddada; border-color: var(--accent); }

    #toast {
      position: fixed;
      bottom: 1.5rem; left: 50%;
      transform: translateX(-50%) translateY(120%);
      background: #fff;
      border-radius: 8px;
      padding: 0.75rem 1.4rem;
      font-size: 0.9rem;
      font-weight: 600;
      transition: transform .3s cubic-bezier(.34,1.56,.64,1);
      white-space: nowrap;
      z-index: 99;
      max-width: 90vw;
      text-align: center;
      box-shadow: 0 4px 20px rgba(0,0,0,.12);
    }
    #toast.show { transform: translateX(-50%) translateY(0); }
    #toast.ok   { border-left: 4px solid var(--success); color: var(--success); }
    #toast.err  { border-left: 4px solid var(--danger);  color: var(--danger);  }

    .history-wrap { width: 100%; max-width: 460px; margin-top: 1.25rem; }
    details {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
    }
    summary {
      cursor: pointer;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: .13em;
      text-transform: uppercase;
      color: var(--accent);
      padding: 1rem 1.5rem;
      user-select: none;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      list-style: none;
    }
    summary::before { content: '▸'; font-size: 0.8rem; transition: transform .2s; }
    details[open] summary::before { transform: rotate(90deg); }
    summary::after { content: ''; flex: 1; height: 1px; background: var(--border); }
    table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
    th {
      text-align: left;
      color: var(--muted);
      font-weight: 600;
      font-size: 0.72rem;
      letter-spacing: .05em;
      text-transform: uppercase;
      padding: 0.5rem 1.5rem;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }
    td { padding: 0.55rem 1.5rem; border-bottom: 1px solid var(--border); vertical-align: middle; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: var(--surface); }
    .badge {
      display: inline-block;
      padding: 2px 9px;
      border-radius: 20px;
      font-size: 0.72rem;
      font-weight: 700;
    }
    .badge.in  { background: var(--success-bg); color: var(--success); }
    .badge.out { background: var(--danger-bg);  color: var(--danger);  }

    .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }
    .field-row > div { display: flex; flex-direction: column; }
    .field-row > div input { margin-bottom: 0; }

    @media (max-width: 420px) {
      .card { padding: 1.5rem 1.1rem; }
      th, td { padding-left: 1rem; padding-right: 1rem; }
      .btn-row { grid-template-columns: 1fr; }
      .field-row { grid-template-columns: 1fr; }
    }
  </style>
</head>

    const stored = localStorage.getItem("lt_nombre");
    if (stored) sel.value = stored;
    sel.addEventListener("change", () => localStorage.setItem("lt_nombre", sel.value));

    // Reloj
    function tick() {
      const now = new Date();
      document.getElementById("fecha").value = now.toISOString().split("T")[0];
      document.getElementById("hora").value  = now.toLocaleTimeString("es-MX");
    }
    tick();
    setInterval(tick, 1000);

    // Calcular distancia en metros entre dos coordenadas (fórmula Haversine)
    function distanciaMetros(lat1, lng1, lat2, lng2) {
      const R = 6371000;
      const dLat = (lat2 - lat1) * Math.PI / 180;
      const dLng = (lng2 - lng1) * Math.PI / 180;
      const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                Math.cos(lat1 * Math.PI/180) * Math.cos(lat2 * Math.PI/180) *
                Math.sin(dLng/2) * Math.sin(dLng/2);
      return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    }

    // Verificar GPS
    function verificarUbicacion() {
      const statusEl = document.getElementById("gpsStatus");
      const msgEl    = document.getElementById("gpsMsg");

      if (!navigator.geolocation) {
        statusEl.className = "gps-status error";
        msgEl.textContent  = "Este dispositivo no soporta GPS.";
        return;
      }

      navigator.geolocation.getCurrentPosition(
        pos => {
          const dist = distanciaMetros(
            pos.coords.latitude, pos.coords.longitude,
            OFICINA_LAT, OFICINA_LNG
          );

          if (dist <= RADIO_M) {
            statusEl.className = "gps-status ok";
            msgEl.textContent  = "Ubicación verificada — estás en la oficina ✓";
            document.getElementById("btnIn").disabled  = false;
            document.getElementById("btnOut").disabled = false;
          } else {
            statusEl.className = "gps-status error";
            msgEl.textContent  = "Fuera de la oficina — registro no permitido (" + Math.round(dist) + "m)";
          }
        },
        err => {
          statusEl.className = "gps-status error";
          msgEl.textContent  = "No se pudo obtener ubicación. Permite el acceso al GPS.";
        },
        { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
      );
    }

    verificarUbicacion();
    // Re-verificar cada 60 segundos
    setInterval(verificarUbicacion, 60000);

    // Toast
    let toastTimer;
    function showToast(msg, type = "ok") {
      const t = document.getElementById("toast");
      t.textContent = msg;
      t.className = "show " + type;
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => t.className = "", 3500);
    }

    // Registrar
    async function registrar(tipo) {
      const nombre = sel.value;
      if (!nombre) { showToast("Selecciona un empleado primero.", "err"); return; }

      const btnIn  = document.getElementById("btnIn");
      const btnOut = document.getElementById("btnOut");
      btnIn.disabled = btnOut.disabled = true;

      const now   = new Date();
      const hora  = now.toLocaleTimeString("es-MX");
      const fecha = now.toLocaleDateString("es-MX");
      const url   = SCRIPT_URL + "?" + new URLSearchParams({ accion: tipo, nombre, hora, fecha });

      try {
        const res  = await fetch(url);
        const json = await res.json();
        if (json.status === "ok") {
          showToast(tipo + " registrada — " + hora, "ok");
          cargarHistorial();
        } else {
          showToast(json.mensaje || "Error del servidor.", "err");
        }
      } catch (err) {
        showToast("Sin conexión al servidor.", "err");
      } finally {
        btnIn.disabled  = false;
        btnOut.disabled = false;
      }
    }

    // Historial
    async function cargarHistorial() {
      const tbody = document.getElementById("tbodyHistorial");
      try {
        const res  = await fetch(SCRIPT_URL + "?accion=historial");
        const json = await res.json();
        if (!json.registros || json.registros.length === 0) {
          tbody.innerHTML = '<tr><td colspan="4" style="color:var(--muted);text-align:center;padding:1.2rem">Sin registros aún.</td></tr>';
          return;
        }
        tbody.innerHTML = json.registros.slice(-15).reverse().map(r => `
          <tr>
            <td>${r.nombre}</td>
            <td><span class="badge ${r.tipo === 'Entrada' ? 'in' : 'out'}">${r.tipo}</span></td>
            <td>${r.hora}</td>
            <td>${r.fecha}</td>
          </tr>`).join("");
      } catch {
        tbody.innerHTML = '<tr><td colspan="4" style="color:var(--muted);text-align:center;padding:1.2rem">No se pudo cargar el historial.</td></tr>';
      }
    }

    cargarHistorial();
  </script>
</body>
</html>
